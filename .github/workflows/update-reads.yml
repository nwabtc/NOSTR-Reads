name: Update NOSTR Reads

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch reads via HTTP API
        run: |
          mkdir -p data
          
          # Use nostr.band API (reliable HTTP, no WebSockets)
          curl -s "https://api.nostr.band/v0/events?authors=3bf0c63fcb93463407af97a5e5ee64fa883d107ef9e558472c4eb9aaaefa459d&kinds=30023&limit=50" > /tmp/response.json
          
          # Check if we got valid data
          if [ -s /tmp/response.json ]; then
            TIMESTAMP=$(date +%s)
            # Extract the events array from the response
            EVENTS=$(cat /tmp/response.json | jq '.events // []')
            echo "{\"lastUpdated\": $TIMESTAMP, \"data\": $EVENTS}" > data/reads.json
            echo "Success: $(echo $EVENTS | jq 'length') reads found"
          else
            echo "Error: Empty response from API"
            exit 1
          fi
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/reads.json
          git diff --staged --quiet || (git commit -m "Update reads" && git push)
