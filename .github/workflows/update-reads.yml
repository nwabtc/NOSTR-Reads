name: Update NOSTR Reads

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Fetch reads from Nostr relay
        run: |
          npm init -y
          npm install nostr-tools@2.3.1
          node fetch-reads.js
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/reads.json
          git diff --staged --quiet || (git commit -m "Update reads" && git push)
